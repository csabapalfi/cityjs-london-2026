<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0b1020" media="(prefers-color-scheme: dark)">
<title>CityJS London 2026 — Day 3</title>
<style>
:root {
  color-scheme: light dark;
  --bg: #ffffff;
  --fg: #0b1020;
  --focus: #3b82f6;
  --muted: #556072;
  --line: #e6e8ef;
  --card: #f7f8fb;
  --card-hover: #eef0f6;
  --pick: #fbbf24;
  --pick-bg: #fff8e1;
  --conflict: #dc2626;
  --conflict-bg: #fee2e2;
  --break: #94a3b8;
  --now: #dc2626;
  --shadow: 0 1px 2px rgba(0,0,0,.04), 0 2px 6px rgba(0,0,0,.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0b1020;
    --fg: #e7eaf3;
    --muted: #94a3b8;
    --line: #1e2436;
    --card: #131a2e;
    --card-hover: #1a2238;
    --pick: #fbbf24;
    --pick-bg: #3d2e08;
    --conflict: #ef4444;
    --conflict-bg: #3a0f11;
    --break: #64748b;
    --now: #ef4444;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.3);
  }
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--focus);
  outline-offset: 2px;
  border-radius: 6px;
}
a { color: inherit; }

header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 10px calc(14px + env(safe-area-inset-right)) 10px calc(14px + env(safe-area-inset-left));
  padding-top: calc(10px + env(safe-area-inset-top));
}
.title { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.title h1 { font-size: 17px; margin: 0; font-weight: 600; text-wrap: balance; }
.title .date { font-size: 13px; color: var(--muted); }
.subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.subtitle a { text-decoration: none; }
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 6px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 999px;
  cursor: pointer;
  min-height: 36px;
  text-decoration: none;
  font-family: inherit;
  transition: background .12s, border-color .12s;
}
.share-btn:hover, .share-btn:active { background: var(--card); border-color: var(--muted); }
.share-btn svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--muted); }
.share-msg { color: var(--muted); font-size: 12px; }

.filters {
  display: flex;
  gap: 6px;
  margin-top: 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filters::-webkit-scrollbar { display: none; }
.chip {
  flex: 0 0 auto;
  min-height: 36px;
  padding: 6px 12px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--fg);
  border-radius: 999px;
  font: inherit;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: background .12s, border-color .12s;
}
.chip:hover { background: var(--card); border-color: var(--muted); }
.chip.active {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}
.chip.active:hover { background: var(--fg); border-color: var(--fg); }
.chip .count {
  font-size: 11px;
  opacity: .7;
}
.chip .dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block;
}
.chip .clash-hint {
  font-size: 11px;
  color: var(--conflict);
  margin-left: 2px;
  font-weight: 500;
}
.chip.active .clash-hint { color: #fda4a4; }

main { padding: 10px calc(14px + env(safe-area-inset-right)) 40px calc(14px + env(safe-area-inset-left)); }

/* ===== Mobile: vertical timeline ===== */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
}
.time-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.time-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .02em;
  margin-top: 14px;
  margin-bottom: 2px;
}
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-left: 4px solid var(--track-color, var(--line));
  border-radius: 8px;
  padding: 10px 12px;
  box-shadow: var(--shadow);
  display: grid;
  grid-template-columns: 1fr auto;
  column-gap: 10px;
  row-gap: 4px;
  align-items: start;
  cursor: pointer;
  transition: background .12s;
}
.card:hover { background: var(--card-hover); }
.card:active { background: var(--card-hover); }
.card.picked {
  background: var(--pick-bg);
  border-left-color: var(--pick);
}
.card.picked.conflict {
  background: var(--pick-bg);
  border: 1px solid var(--line);
  border-left: 4px solid var(--conflict);
  box-shadow: var(--shadow);
}
.card.picked.conflict .star { color: var(--pick); }
.conflict-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--conflict);
  color: #fff;
  letter-spacing: .02em;
  text-transform: uppercase;
}
.card .meta {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.card .meta .track-pill {
  padding: 1px 7px;
  border-radius: 999px;
  color: #fff;
  background: var(--track-color);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .02em;
}
.card .title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
}
.card .speaker {
  font-size: 13px;
  color: var(--muted);
}
.card .tags {
  margin-top: 4px;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.card .tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--line);
  color: var(--muted);
}
.card .star {
  font-size: 28px;
  line-height: 1;
  padding: 6px;
  margin: -6px -4px -6px 0;
  background: none;
  border: 0;
  color: var(--muted);
  cursor: pointer;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .12s;
}
.card .star:hover { color: var(--fg); }
.card.picked .star { color: var(--pick); }
.card.break {
  opacity: .55;
  border-left-color: var(--break);
}
.card.break .star { visibility: hidden; }

.card .details {
  display: none;
  grid-column: 1 / -1;
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.55;
  color: var(--fg);
}
.card.expanded .details { display: block; }
.card .details p { margin: 0; }
.card .details-cta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 6px;
  padding: 0;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  background: transparent;
  border: 0;
  cursor: pointer;
  font-family: inherit;
  align-self: start;
}
.card .details-cta:hover { color: var(--fg); }
.card .details-cta .caret {
  font-size: 9px;
  display: inline-block;
  transition: transform .15s ease;
  transform-origin: center;
}
.card.expanded .details-cta .caret { transform: rotate(180deg); }
.card.expanded .details-cta { color: var(--fg); }

.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}

/* Cap content width on wide screens — always mobile layout */
header > *, main { max-width: 640px; margin-left: auto; margin-right: auto; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
}
</style>
</head>
<body>
<header>
  <div class="title">
    <h1>CityJS London 2026 — Day 3</h1>
    <span class="date">Fri 17 Apr</span>
  </div>
  <div class="subtitle">
    <span>Kensington Town Hall · <a href="https://maps.app.goo.gl/?q=Kensington+Town+Hall+London+W8+7NX" target="_blank" rel="noopener noreferrer">W8&nbsp;7NX</a></span>
    <button type="button" class="share-btn" id="share-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3v13"/><path d="m7 8 5-5 5 5"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/>
      </svg>
      Share Picks
    </button>
    <span id="share-msg" class="share-msg" role="status" aria-live="polite"></span>
  </div>
  <div class="filters" id="filters"></div>
</header>

<main>
  <div id="timeline" class="timeline"></div>
</main>

<script src="data.js?v=3"></script>
<script src="details.js?v=3"></script>
<script>
(() => {
  const STORAGE_KEY = "cityjs-picks-v1";
  const VIEW_KEY = "cityjs-view-v1";
  const CONF_DATE = "2026-04-17";

  function loadPicks() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return new Set(JSON.parse(raw));
    // seed from data.js defaults
    const seeded = new Set(TALKS.filter(t => t.pick).map(t => t.id));
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...seeded]));
    return seeded;
  }
  function savePicks(set) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
  }

  const picks = loadPicks();
  const expanded = new Set(); // in-memory only — resets on reload
  const VIEW_KEYS = new Set(["all", "picks", "t1", "t2", "t3", "t4"]);
  const urlView = new URL(location.href).searchParams.get("view");
  let view = (urlView && VIEW_KEYS.has(urlView))
    ? urlView
    : (localStorage.getItem(VIEW_KEY) || "all");
  function syncViewToUrl() {
    const u = new URL(location.href);
    if (view === "all") u.searchParams.delete("view");
    else u.searchParams.set("view", view);
    history.replaceState({}, "", u.pathname + (u.search || "") + u.hash);
  }
  syncViewToUrl();

  // Merge picks from ?picks=id1,id2,… on first load (replaces, doesn't union —
  // user intent is "sync to what's on the other device")
  const url = new URL(location.href);
  const sharedPicks = url.searchParams.get("picks");
  if (sharedPicks !== null) {
    const validIds = new Set(TALKS.map(t => t.id));
    picks.clear();
    for (const id of sharedPicks.split(",").filter(Boolean)) {
      if (validIds.has(id)) picks.add(id);
    }
    savePicks(picks);
    url.searchParams.delete("picks");
    history.replaceState({}, "", url.pathname + (url.search || "") + url.hash);
  }

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
  function detailsHtml(t) {
    const d = (typeof DETAILS !== "undefined") ? DETAILS[t.id] : null;
    if (!d || !d.desc?.trim()) return "";
    return `<div class="details"><p>${escapeHtml(d.desc)}</p></div>`;
  }
  function hasDetails(t) {
    if (typeof DETAILS === "undefined") return false;
    const d = DETAILS[t.id];
    return !!d && !!d.desc?.trim();
  }

  function toMin(hhmm) { const [h, m] = hhmm.split(":").map(Number); return h * 60 + m; }

  // Returns a Set of ids of picked talks that overlap with at least one other picked talk.
  // Ignores breaks/meta — we only care about real sessions.
  function computeConflicts() {
    const out = new Set();
    const picked = TALKS.filter(t => picks.has(t.id) && t.kind !== "break" && t.kind !== "meta");
    for (let i = 0; i < picked.length; i++) {
      for (let j = i + 1; j < picked.length; j++) {
        const a = picked[i], b = picked[j];
        if (a.track === b.track) continue; // same track can't really clash
        const aS = toMin(a.start), aE = toMin(a.end);
        const bS = toMin(b.start), bE = toMin(b.end);
        if (aS < bE && bS < aE) {
          out.add(a.id);
          out.add(b.id);
        }
      }
    }
    return out;
  }

  const filtersEl = document.getElementById("filters");
  const timelineEl = document.getElementById("timeline");

  function renderFilters() {
    const pickCount = picks.size;
    const conflictCount = conflicts.size;
    filtersEl.innerHTML = "";
    const picksLabel = "★ My Picks";
    const picksSuffix = conflictCount > 0
      ? ` <span class="clash-hint">· ${conflictCount} ${conflictCount === 1 ? "clash" : "clashes"}</span>`
      : "";
    const chips = [
      { key: "all", label: "All", count: TALKS.filter(t => t.kind !== "break").length },
      { key: "picks", label: picksLabel, count: pickCount, suffix: picksSuffix },
      ...Object.entries(TRACKS).map(([k, v]) => ({
        key: "t" + k, label: v.name, color: v.color,
        count: TALKS.filter(t => t.track == k && t.kind !== "break").length,
      })),
    ];
    for (const c of chips) {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "chip" + (view === c.key ? " active" : "");
      b.setAttribute("aria-pressed", view === c.key ? "true" : "false");
      b.innerHTML = (c.color ? `<span class="dot" style="background:${c.color}" aria-hidden="true"></span>` : "")
        + c.label + ` <span class="count">${c.count}</span>` + (c.suffix || "");
      b.onclick = () => {
        view = c.key;
        localStorage.setItem(VIEW_KEY, view);
        syncViewToUrl();
        render();
      };
      filtersEl.appendChild(b);
    }
  }

  function filterTalks() {
    if (view === "all") return TALKS;
    if (view === "picks") return TALKS.filter(t => picks.has(t.id));
    const trackNum = Number(view.slice(1));
    return TALKS.filter(t => t.track === trackNum);
  }

  function cardHtml(t) {
    const trackInfo = TRACKS[t.track];
    const isPicked = picks.has(t.id);
    const isConflict = conflicts.has(t.id);
    const isBreak = t.kind === "break";
    const tagsHtml = t.tags?.length
      ? `<div class="tags">${t.tags.map(x => `<span class="tag">${x}</span>`).join("")}</div>`
      : "";
    const speakerHtml = t.speaker
      ? `<div class="speaker">${t.speaker}${t.org ? ` · <span style="opacity:.8">${t.org}</span>` : ""}</div>`
      : "";
    const conflictBadge = isConflict ? `<span class="conflict-badge">clash</span>` : "";
    const isExpanded = expanded.has(t.id);
    const cta = hasDetails(t)
      ? `<button class="details-cta" type="button" aria-expanded="${isExpanded}">${isExpanded ? "Less" : "More"} <span class="caret" aria-hidden="true">▼</span></button>`
      : "";
    return `
      <article class="card${isPicked ? " picked" : ""}${isConflict ? " conflict" : ""}${isBreak ? " break" : ""}${isExpanded ? " expanded" : ""}"
               data-id="${t.id}"
               style="--track-color:${trackInfo.color}">
        <div>
          <div class="meta">
            <span class="track-pill">${trackInfo.name}</span>
            <span>${t.start}–${t.end}</span>
            ${conflictBadge}
          </div>
          <div class="title">${t.title}</div>
          ${speakerHtml}
          ${tagsHtml}
          ${cta}
        </div>
        <button class="star" aria-label="${isPicked ? "Unpick" : "Pick"} ${escapeHtml(t.title)}" aria-pressed="${isPicked}">${isPicked ? "★" : "☆"}</button>
        ${detailsHtml(t)}
      </article>`;
  }

  function renderMobile() {
    const talks = filterTalks().slice().sort((a, b) => a.start.localeCompare(b.start));
    if (talks.length === 0) {
      timelineEl.innerHTML = `<div class="empty">No talks match this view.</div>`;
      return;
    }
    // group by start time
    const groups = {};
    for (const t of talks) {
      (groups[t.start] ||= []).push(t);
    }
    timelineEl.innerHTML = Object.entries(groups).map(([time, ts]) => `
      <div class="time-group">
        <div class="time-label">${time}</div>
        ${ts.map(cardHtml).join("")}
      </div>
    `).join("");
    timelineEl.classList.remove("grid-mode");
  }

  let conflicts = new Set();
  let firstRender = true;
  function render() {
    const scrollY = window.scrollY;
    conflicts = computeConflicts();
    renderFilters();
    renderMobile();
    if (!firstRender) window.scrollTo(0, scrollY);
    firstRender = false;
  }

  // click handlers (delegated)
  timelineEl.addEventListener("click", (e) => {
    const card = e.target.closest(".card");
    if (!card) return;
    const id = card.dataset.id;
    const star = e.target.closest(".star");
    if (star) {
      if (picks.has(id)) picks.delete(id); else picks.add(id);
      savePicks(picks);
      render();
      return;
    }
    // tap on card body → toggle expansion (only if details exist)
    const talk = TALKS.find(t => t.id === id);
    if (!talk || !hasDetails(talk)) return;
    if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
    render();
  });

  // Share picks: Web Share API (iOS AirDrop), clipboard fallback
  document.getElementById("share-link").addEventListener("click", async (e) => {
    e.preventDefault();
    const url = new URL(location.href);
    url.searchParams.set("picks", [...picks].join(","));
    const shareUrl = url.toString();
    const msg = document.getElementById("share-msg");
    const show = (txt) => {
      msg.textContent = txt;
      setTimeout(() => { msg.textContent = ""; }, 2500);
    };
    try {
      if (navigator.share) {
        await navigator.share({ title: "CityJS picks", url: shareUrl });
        return;
      }
    } catch (err) {
      if (err.name === "AbortError") return; // user cancelled
    }
    try {
      await navigator.clipboard.writeText(shareUrl);
      show("Link copied");
    } catch {
      prompt("Copy this URL:", shareUrl);
    }
  });

  render();
})();
</script>
